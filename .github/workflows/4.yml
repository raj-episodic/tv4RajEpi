name: T4 (Shards 15-19)
on:
  workflow_dispatch:
  schedule:
    - cron: '30 11 * * 1-5'
jobs:
  scrape:
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      max-parallel: 5
      matrix:
        shard: [15, 16, 17, 18, 19]
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: pip install selenium beautifulsoup4 gspread webdriver-manager
      - name: Write credentials
        run: |
          echo '${{ secrets.GSPREAD_CREDENTIALS }}' > credentials.json
          echo '${{ secrets.TRADINGVIEW_COOKIES }}' > cookies.json
      - name: Run scraper
        env:
          SHARD_INDEX: ${{ matrix.shard }}
          SHARD_STEP: 25
          CHECKPOINT_FILE: checkpoint_g4_${{ matrix.shard }}.txt
        run: python run_scraper.py
